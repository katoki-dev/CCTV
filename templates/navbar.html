<nav class="main-nav">
    <div class="nav-container">
        <!-- Brand Logo -->
        <div class="nav-brand">
            <a href="/" class="brand-link">
                <span class="brand-logo">📹</span>
                <span class="brand-text">CEMSS</span>
            </a>
        </div>

        <!-- Mobile Menu Toggle -->
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
            <span class="hamburger"></span>
        </button>

        <!-- Navigation Links -->
        <div class="nav-menu" id="navMenu">
            <a href="{{ url_for('campus.portal_page') }}"
                class="nav-item {% if request.endpoint == 'campus.portal_page' %}active{% endif %}">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            
            {% if current_user.is_admin %}
            <a href="{{ url_for('dashboard') }}"
                class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Camera Page</span>
            </a>
            <a href="{{ url_for('detections_page') }}"
                class="nav-item {% if request.endpoint == 'detections_page' %}active{% endif %}">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Detections</span>
            </a>
            <a href="{{ url_for('analytics_dashboard') }}"
                class="nav-item {% if request.endpoint == 'analytics_dashboard' %}active{% endif %}">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Analytics</span>
            </a>
            <a href="{{ url_for('recordings_page') }}"
                class="nav-item {% if request.endpoint == 'recordings_page' %}active{% endif %}">
                <span class="nav-icon">📹</span>
                <span class="nav-label">Recordings</span>
            </a>
            <a href="{{ url_for('admin.admin_panel') }}"
                class="nav-item {% if request.endpoint == 'admin_panel' %}active{% endif %}">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Admin</span>
            </a>
            {% endif %}
        </div>

        <!-- Notifications & SOS -->
        <div class="notifications-section">
            <button class="sos-btn" id="sosBtn" onclick="triggerSOS()" aria-label="Emergency SOS">
                <span class="sos-text">SOS</span>
            </button>
            <button class="notif-btn" id="notifBtn" aria-label="Notifications">
                <span class="notif-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </span>
                <span class="notif-badge" id="notifBadge" style="display: none;">0</span>
            </button>
            <div class="notif-dropdown" id="notifDropdown">
                <div class="notif-header">
                    <span class="notif-title">Notifications</span>
                    <button class="notif-clear" id="notifClear">Mark all as read</button>
                </div>
                <div class="notif-list" id="notifList">
                    <!-- Notifications will be loaded here -->
                </div>
            </div>
        </div>

        <!-- User Dropdown -->
        <div class="user-section">
            <div class="user-dropdown">
                <button class="user-btn" id="userDropdownBtn" aria-label="User menu">
                    <span class="user-avatar">{{ current_user.username[0]|upper }}</span>
                    <span class="user-name">{{ current_user.username }}</span>
                    <span class="dropdown-arrow">▼</span>
                </button>
                <div class="user-dropdown-menu" id="userDropdownMenu">
                    <div class="dropdown-header">
                        <div class="dropdown-user-info">
                            <div class="dropdown-avatar">{{ current_user.username[0]|upper }}</div>
                            <div class="dropdown-details">
                                <div class="dropdown-username">{{ current_user.username }}</div>
                                <div class="dropdown-role">{% if current_user.is_admin %}Administrator{% else %}User{%
                                    endif %}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="{{ url_for('account_page') }}" class="dropdown-item">
                        <span class="dropdown-icon">👤</span>
                        <span class="dropdown-text">My Profile</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="{{ url_for('auth.logout') }}" class="dropdown-item danger">
                        <span class="dropdown-icon">🚪</span>
                        <span class="dropdown-text">Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Link to Navbar CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">


<script>
    (function () {
        // User dropdown toggle
        const userBtn = document.getElementById('userDropdownBtn');
        const userMenu = document.getElementById('userDropdownMenu');

        if (userBtn && userMenu) {
            userBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                userMenu.classList.toggle('show');
            });

            document.addEventListener('click', function (e) {
                if (!userBtn.contains(e.target) && !userMenu.contains(e.target)) {
                    userMenu.classList.remove('show');
                }
            });
        }

        // Mobile menu toggle
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.getElementById('navMenu');

        if (navToggle && navMenu) {
            navToggle.addEventListener('click', function () {
                navMenu.classList.toggle('show');
            });
        }

        // Notifications Dropdown and Logic
        const notifBtn = document.getElementById('notifBtn');
        const notifDropdown = document.getElementById('notifDropdown');
        const notifBadge = document.getElementById('notifBadge');
        const notifList = document.getElementById('notifList');
        const notifClear = document.getElementById('notifClear');

        window.showToast = function(message, type = 'info') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'success' ? '✅' : type === 'error' ? '🚨' : type === 'warning' ? '⚠️' : 'ℹ️';
            
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };

        if (notifBtn && notifDropdown) {
            notifBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                notifDropdown.classList.toggle('show');
                if (notifDropdown.classList.contains('show')) {
                    loadNotifications();
                }
            });

            document.addEventListener('click', function (e) {
                if (!notifBtn.contains(e.target) && !notifDropdown.contains(e.target)) {
                    notifDropdown.classList.remove('show');
                }
            });
        }

        // SOS Trigger (Global)
        window.triggerSOS = async function() {
            if (!confirm("🚨 EMERGENCY SOS\n\nThis will immediately notify campus security and administrators. Are you sure you want to trigger an emergency alert?")) return;
            
            const btn = document.getElementById('sosBtn');
            if (!btn) return;
            btn.classList.add('loading');
            btn.innerHTML = '<span class="loader-spinner" style="width:16px;height:16px;border-width:2px"></span>';
            
            try {
                const res = await fetch('/api/sos', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    if (window.showToast) window.showToast(data.message, 'success');
                    else alert(data.message);
                } else {
                    alert("Failed to trigger SOS: " + (data.error || "Unknown error"));
                }
            } catch (e) {
                console.error("SOS Error:", e);
                alert("Network error while triggering SOS.");
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = '<span class="sos-text">SOS</span>';
            }
        };

        async function loadNotifications() {
            try {
                const res = await fetch('/api/notifications');
                const notifs = await res.json();
                updateNotifUI(notifs);
            } catch (e) { console.error("Error loading notifications", e); }
        }

        function updateNotifUI(notifs) {
            if (!Array.isArray(notifs)) return;
            const unreadCount = notifs.filter(n => !n.is_read).length;
            if (unreadCount > 0) {
                notifBadge.textContent = unreadCount;
                notifBadge.style.display = 'flex';
            } else {
                notifBadge.style.display = 'none';
            }
            
            if (notifs.length === 0) {
                notifList.innerHTML = '<div class="notif-empty">No notifications</div>';
                return;
            }
            
            notifList.innerHTML = notifs.map(n => {
                const typeClass = n.n_type ? `notif-type-${n.n_type}` : '';
                const unreadClass = n.is_read ? '' : 'unread';
                const timeStr = new Date(n.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                return `
                    <div class="notif-item ${unreadClass} ${typeClass}" onclick="handleNotifClick(${n.id}, '${n.link}')">
                        <div class="notif-item-header">
                            <span class="notif-item-title">${n.title}</span>
                            <span class="notif-item-time">${timeStr}</span>
                        </div>
                        <div class="notif-item-msg">${n.message}</div>
                    </div>
                `;
            }).join('');
        }

        window.handleNotifClick = async function(id, link) {
            // Optional: mark as read immediately
            if (link) window.location.href = link;
        }

        if (notifClear) {
            notifClear.addEventListener('click', async () => {
                await fetch('/api/notifications/mark_read', { method: 'POST' });
                loadNotifications();
            });
        }

        // Socket integration
        function setupSocket() {
            if (typeof socket !== 'undefined') {
                socket.on('new_notification', (notif) => {
                    loadNotifications();
                    if (window.showToast) window.showToast(`New Notification: ${notif.title}`, 'info');
                });
                
                socket.on('emergency_alert', (data) => {
                    if (window.showToast) window.showToast(`🚨 EMERGENCY: ${data.message}`, 'error');
                });
            }
        }

        loadNotifications();
        setupSocket();
        
        // Refresh notifications every 60 seconds as fallback
        setInterval(loadNotifications, 60000);
    })();
</script>
